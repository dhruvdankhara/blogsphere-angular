<article
  class="blog-card group flex gap-6 p-6 rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] hover:shadow-[0_16px_48px_rgba(23,32,51,0.12)] transition-shadow mb-6"
>
  <!-- Thumbnail -->
  @if (blog().featureImage) {
    <a [routerLink]="['/blog', blog().slug]" class="shrink-0">
      <img
        [src]="blog().featureImage"
        [alt]="blog().title"
        class="w-32 h-32 sm:w-40 sm:h-32 object-cover rounded-2xl border border-slate-900/10 shadow-md group-hover:scale-105 transition-transform"
      />
    </a>
  }
  <div class="flex-1 min-w-0">
    <!-- Author info -->
    <div class="flex items-center gap-2 mb-2">
      <p-avatar
        [image]="blog().author.avatar || ''"
        [label]="blog().author.avatar ? '' : blog().author.name?.[0] || 'U'"
        shape="circle"
        styleClass="bg-gradient-to-br from-gray-200 to-gray-400 text-gray-700 border border-slate-900/10"
      />
      <a
        [routerLink]="['/profile', blog().author.username]"
        class="text-sm font-semibold text-[#355d87] hover:text-[#172033] no-underline"
      >
        {{ blog().author.name }}
      </a>
      <span class="text-gray-300">&middot;</span>
      <span class="text-xs text-gray-400">{{ blog().createdAt | date: 'MMM d, y' }}</span>
    </div>

    <!-- Title & Preview -->
    <a [routerLink]="['/blog', blog().slug]" class="no-underline">
      <h2
        class="text-2xl font-extrabold text-[#172033] mb-2 line-clamp-2 group-hover:text-[#355d87] transition-colors"
      >
        {{ blog().title }}
      </h2>
      <p class="text-gray-500 text-[1rem] line-clamp-2 mb-4">
        {{ getContentPreview() }}
      </p>
    </a>

    <!-- Meta -->
    <div class="flex items-center gap-3 flex-wrap">
      @if (blog().category) {
        <a [routerLink]="['/category', blog().category?.slug]" class="no-underline">
          <p-tag
            [value]="blog().category?.name || ''"
            severity="contrast"
            styleClass="rounded-full px-3 py-1 text-xs font-semibold"
          />
        </a>
      }
      <span class="text-xs text-gray-400">{{ getReadTime() }} min read</span>
      @if (blog().visits > 0) {
        <span class="text-xs text-gray-400">{{ blog().visits }} views</span>
      }
    </div>
  </div>
</article>
