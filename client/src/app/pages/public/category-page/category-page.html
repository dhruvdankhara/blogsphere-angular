<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-black text-[#172033] capitalize mb-2">{{ slug() }}</h1>
    <p class="text-lg text-gray-500">Browse all stories in this category</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-16">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    @for (blog of blogs(); track blog._id) {
      <app-blog-card [blog]="blog" />
    }
    @if (!blogs().length) {
      <div
        class="flex flex-col items-center justify-center py-24 rounded-2xl border border-slate-900/10 bg-white shadow-md"
      >
        <i class="fa fa-folder-open text-5xl text-gray-300 mb-6"></i>
        <p class="text-xl text-gray-400 font-semibold">No stories in this category yet</p>
      </div>
    }
  }
</div>
