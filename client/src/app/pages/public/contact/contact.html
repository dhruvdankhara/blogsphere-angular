<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
  <h1 class="text-4xl font-bold text-gray-900 mb-6">Contact Us</h1>

  <div class="prose prose-lg text-gray-600 space-y-6 mb-10">
    <p>
      Have a question, suggestion, or issue? We would love to hear from you. Reach out using any of
      the methods below and we will get back to you as soon as possible.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="border border-gray-200 rounded-lg p-6 text-center">
      <i class="fa fa-envelope text-3xl text-gray-400 mb-3"></i>
      <h3 class="text-lg font-semibold text-gray-900 mb-1">Email</h3>
      <p class="text-sm text-gray-500">support&#64;blogsphere.com</p>
    </div>

    <div class="border border-gray-200 rounded-lg p-6 text-center">
      <i class="fa-brands fa-twitter text-3xl text-gray-400 mb-3"></i>
      <h3 class="text-lg font-semibold text-gray-900 mb-1">Social</h3>
      <p class="text-sm text-gray-500">&#64;blogsphere</p>
    </div>

    <div class="border border-gray-200 rounded-lg p-6 text-center">
      <i class="fa-brands fa-github text-3xl text-gray-400 mb-3"></i>
      <h3 class="text-lg font-semibold text-gray-900 mb-1">GitHub</h3>
      <p class="text-sm text-gray-500">Open an issue</p>
    </div>
  </div>

  <div class="mt-12 border border-gray-200 rounded-lg p-8">
    <h2 class="text-xl font-bold text-gray-900 mb-6">Send a Message</h2>
    <form class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" pInputText class="w-full" placeholder="Your name" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" pInputText class="w-full" placeholder="your&#64;email.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
        <textarea pInputTextarea rows="5" class="w-full" placeholder="How can we help?"></textarea>
      </div>
      <p-button label="Send Message" severity="contrast" />
    </form>
  </div>
</div>
