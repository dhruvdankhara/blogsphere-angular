<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Join BlogSphere</h1>
      <p class="text-gray-500">Create your account to start writing</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input
          type="text"
          pInputText
          [(ngModel)]="name"
          name="name"
          class="w-full"
          placeholder="Your name"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          pInputText
          [(ngModel)]="email"
          name="email"
          class="w-full"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          type="text"
          pInputText
          [(ngModel)]="username"
          name="username"
          class="w-full"
          placeholder="Choose a username"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <p-password
          [(ngModel)]="password"
          name="password"
          [toggleMask]="true"
          [feedback]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Min 8 characters"
        />
      </div>

      <p-button
        type="submit"
        label="Create Account"
        [loading]="loading()"
        styleClass="w-full"
        severity="contrast"
      />
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a routerLink="/login" class="text-gray-900 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
