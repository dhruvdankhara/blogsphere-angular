<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-black text-[#172033] capitalize mb-2">{{ slug() }}</h1>
    <p class="text-lg text-gray-500">Stories tagged with this topic</p>
  </div>

  @if (relatedTags().length) {
    <div class="mb-10">
      <h3 class="text-base font-semibold text-[#355d87] uppercase tracking-wider mb-4">
        Related Tags
      </h3>
      <div class="flex flex-wrap gap-2">
        @for (tag of relatedTags(); track tag._id) {
          <app-tag-chip [name]="tag.name" [slug]="tag.slug" />
        }
      </div>
    </div>
  }

  @if (loading()) {
    <div class="flex justify-center py-16">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    @for (blog of blogs(); track blog._id) {
      <app-blog-card [blog]="blog" />
    }
    @if (!blogs().length) {
      <div
        class="flex flex-col items-center justify-center py-24 rounded-2xl border border-slate-900/10 bg-white shadow-md"
      >
        <i class="fa fa-tag text-5xl text-gray-300 mb-6"></i>
        <p class="text-xl text-gray-400 font-semibold">No stories with this tag yet</p>
      </div>
    }
  }
</div>
