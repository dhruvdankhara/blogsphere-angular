<div class="min-h-[80vh] flex items-center justify-center px-4 bg-gray-50">
  <div class="w-full max-w-md">
    <div
      class="login-card rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] p-8"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h1>
        <p class="text-gray-500">Sign in to your account</p>
      </div>
      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
          <input
            type="text"
            pInputText
            [(ngModel)]="username"
            name="username"
            class="w-full"
            placeholder="Enter username or email"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <p-password
            [(ngModel)]="password"
            name="password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
            placeholder="Enter password"
            required
          />
        </div>
        <p-button
          type="submit"
          label="Sign In"
          [loading]="loading()"
          styleClass="w-full"
          severity="contrast"
        />
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        No account?
        <a routerLink="/register" class="text-gray-900 font-medium hover:underline">Create one</a>
      </p>
    </div>
  </div>
</div>
