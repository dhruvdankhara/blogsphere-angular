<div>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Manage Users</h1>
      <p class="text-sm text-gray-500 mt-1">View and manage all platform users</p>
    </div>
  </div>

  <div class="mb-4">
    <div class="flex items-center gap-3">
      <div class="p-inputgroup flex-1" style="max-width: 400px">
        <span class="p-inputgroup-addon"><i class="pi pi-search"></i></span>
        <input
          type="text"
          pInputText
          placeholder="Search users by name, username or email..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          (keyup.enter)="onSearch()"
        />
      </div>
      <p-button label="Search" icon="pi pi-search" (click)="onSearch()" severity="contrast" />
    </div>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    <p-table
      [value]="users()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [tableStyle]="{ 'min-width': '60rem' }"
      stripedRows
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Avatar</th>
          <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
          <th pSortableColumn="username">Username <p-sortIcon field="username" /></th>
          <th>Email</th>
          <th>Role</th>
          <th pSortableColumn="createdAt">Joined <p-sortIcon field="createdAt" /></th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <p-avatar [image]="user.avatar" shape="circle" size="normal" />
          </td>
          <td class="font-medium text-gray-900">{{ user.name }}</td>
          <td class="text-gray-600">{{ user.username }}</td>
          <td class="text-gray-600">{{ user.email }}</td>
          <td>
            <p-select
              [options]="roleOptions"
              [ngModel]="user.role"
              (ngModelChange)="onRoleChange(user._id, $event)"
              placeholder="Select Role"
              [style]="{ width: '120px' }"
            />
          </td>
          <td class="text-gray-500">{{ user.createdAt | date: 'MMM d, y' }}</td>
          <td>
            <p-button
              icon="pi pi-trash"
              [text]="true"
              severity="danger"
              size="small"
              (click)="deleteUser(user)"
            />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-center text-gray-400 py-10">No users found</td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>
