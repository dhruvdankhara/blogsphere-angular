<div class="max-w-7xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-black text-[#172033] mb-2">Dashboard</h1>
    <p class="text-lg text-gray-500">Overview of your platform statistics</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    <div
      class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] p-8"
    >
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (card of statCards(); track card.label) {
          <div
            class="flex items-center gap-4 p-4 rounded-xl border border-slate-900/5 bg-gradient-to-br from-slate-900/3 to-transparent"
          >
            <div class="w-14 h-14 rounded-lg flex items-center justify-center {{ card.color }}">
              <i class="{{ card.icon }} text-2xl"></i>
            </div>
            <div>
              <p class="text-3xl font-bold text-[#172033]">{{ card.value }}</p>
              <p class="text-sm text-gray-500 font-medium">{{ card.label }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
