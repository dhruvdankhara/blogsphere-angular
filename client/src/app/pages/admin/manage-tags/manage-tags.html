<div>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Manage Tags</h1>
      <p class="text-sm text-gray-500 mt-1">Create and manage blog tags</p>
    </div>
    <p-button label="New Tag" icon="pi pi-plus" (click)="openCreateDialog()" severity="contrast" />
  </div>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    <p-table
      [value]="tags()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [tableStyle]="{ 'min-width': '30rem' }"
      stripedRows
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
          <th>Slug</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-tag>
        <tr>
          <td class="font-medium text-gray-900">{{ tag.name }}</td>
          <td class="text-gray-500">{{ tag.slug }}</td>
          <td>
            <div class="flex items-center gap-1">
              <p-button
                icon="pi pi-pencil"
                [text]="true"
                severity="info"
                size="small"
                (click)="openEditDialog(tag)"
              />
              <p-button
                icon="pi pi-trash"
                [text]="true"
                severity="danger"
                size="small"
                (click)="deleteTag(tag)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="text-center text-gray-400 py-10">No tags found</td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>

<p-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [header]="dialogMode() === 'create' ? 'Create Tag' : 'Edit Tag'"
  [modal]="true"
  [style]="{ width: '420px' }"
>
  <div class="flex flex-col gap-4 pt-2">
    <div class="flex flex-col gap-1">
      <label for="tagName" class="text-sm font-medium text-gray-700">Name</label>
      <input
        id="tagName"
        type="text"
        pInputText
        [ngModel]="formName()"
        (ngModelChange)="onNameChange($event)"
        placeholder="Tag name"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="tagSlug" class="text-sm font-medium text-gray-700">Slug</label>
      <input
        id="tagSlug"
        type="text"
        pInputText
        [ngModel]="formSlug()"
        (ngModelChange)="formSlug.set($event)"
        placeholder="tag-slug"
      />
      <p class="text-xs text-gray-400">Auto-generated from name. You can edit manually.</p>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [text]="true"
        (click)="dialogVisible.set(false)"
      />
      <p-button
        [label]="dialogMode() === 'create' ? 'Create' : 'Update'"
        icon="pi pi-check"
        (click)="saveTag()"
        [loading]="saving()"
        severity="contrast"
      />
    </div>
  </ng-template>
</p-dialog>
