<div class="max-w-7xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="flex items-center justify-between mb-10">
    <div>
      <h1 class="text-4xl md:text-5xl font-black text-[#172033] mb-2">Manage Tags</h1>
      <p class="text-lg text-gray-500">Create and manage blog tags</p>
    </div>
    <p-button
      label="New Tag"
      icon="fa fa-plus"
      (click)="openCreateDialog()"
      severity="contrast"
      size="large"
    />
  </div>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    <div
      class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] overflow-hidden"
    >
      <p-table
        [value]="tags()"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        [tableStyle]="{ 'min-width': '30rem' }"
        stripedRows
      >
        <ng-template pTemplate="header">
          <tr class="bg-gradient-to-r from-[#172033]/5 to-transparent">
            <th pSortableColumn="name" class="text-[#172033] font-bold">
              Name <p-sortIcon field="name" />
            </th>
            <th class="text-[#172033] font-bold">Slug</th>
            <th class="text-[#172033] font-bold">Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-tag>
          <tr class="hover:bg-slate-900/3 transition-colors">
            <td class="font-semibold text-[#172033]">{{ tag.name }}</td>
            <td class="text-gray-600">{{ tag.slug }}</td>
            <td>
              <div class="flex items-center gap-2">
                <p-button
                  icon="fa fa-pencil"
                  severity="info"
                  size="small"
                  [outlined]="true"
                  (click)="openEditDialog(tag)"
                />
                <p-button
                  icon="fa fa-trash"
                  severity="danger"
                  size="small"
                  [outlined]="true"
                  (click)="deleteTag(tag)"
                />
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="text-center py-16">
              <div class="flex flex-col items-center justify-center">
                <i class="fa fa-tag text-5xl text-gray-300 mb-4"></i>
                <p class="text-gray-400 font-medium">No tags found</p>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
</div>

<p-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [header]="dialogMode() === 'create' ? 'Create Tag' : 'Edit Tag'"
  [modal]="true"
  [style]="{ width: '420px' }"
  headerStyleClass="bg-gradient-to-r from-[#172033] to-[#355d87] text-white border-0"
>
  <div class="flex flex-col gap-5 pt-2">
    <div class="flex flex-col gap-2">
      <label for="tagName" class="text-sm font-semibold text-[#172033]">Name</label>
      <input
        id="tagName"
        type="text"
        pInputText
        [ngModel]="formName()"
        (ngModelChange)="onNameChange($event)"
        placeholder="Tag name"
        class="px-4 py-3 rounded-lg border border-slate-900/10 focus:outline-none focus:ring-2 focus:ring-[#355d87]/20"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="tagSlug" class="text-sm font-semibold text-[#172033]">Slug</label>
      <input
        id="tagSlug"
        type="text"
        pInputText
        [ngModel]="formSlug()"
        (ngModelChange)="formSlug.set($event)"
        placeholder="tag-slug"
        class="px-4 py-3 rounded-lg border border-slate-900/10 focus:outline-none focus:ring-2 focus:ring-[#355d87]/20"
      />
      <p class="text-xs text-gray-500 font-medium">
        Auto-generated from name. You can edit manually.
      </p>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [text]="true"
        (click)="dialogVisible.set(false)"
      />
      <p-button
        [label]="dialogMode() === 'create' ? 'Create' : 'Update'"
        icon="fa fa-check"
        (click)="saveTag()"
        [loading]="saving()"
        severity="contrast"
      />
    </div>
  </ng-template>
</p-dialog>
