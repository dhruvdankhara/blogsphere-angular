<div class="max-w-6xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-black text-[#172033] mb-2">Bookmarks</h1>
    <p class="text-lg text-gray-500">Stories saved for later reading</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-16">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    @if (!bookmarks().length) {
      <div
        class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)]"
      >
        <div class="flex flex-col items-center justify-center py-24">
          <i class="fa fa-bookmark text-6xl text-gray-300 mb-6"></i>
          <p class="text-lg text-gray-400 font-medium mb-2">No bookmarks yet</p>
          <p class="text-sm text-gray-500 text-center max-w-md mb-6">
            Stories you bookmark will appear here for easy access.
          </p>
          <a routerLink="/explore">
            <p-button label="Explore stories" severity="contrast" />
          </a>
        </div>
      </div>
    } @else {
      <div class="space-y-6">
        @for (bookmark of bookmarks(); track bookmark._id) {
          @if (bookmark.blog) {
            <div
              class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] overflow-hidden"
            >
              <div class="p-6">
                <app-blog-card [blog]="bookmark.blog" />
                <div class="flex justify-end mt-6 pt-6 border-t border-slate-900/10">
                  <p-button
                    icon="fa fa-bookmark"
                    label="Remove bookmark"
                    [text]="true"
                    severity="danger"
                    (click)="removeBookmark(bookmark.blogId)"
                  />
                </div>
              </div>
            </div>
          }
        }
      </div>
    }
  }
</div>
