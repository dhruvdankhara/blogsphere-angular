<div class="max-w-3xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-black text-[#172033] mb-2">Settings</h1>
    <p class="text-lg text-gray-500">Manage your profile and account</p>
  </div>

  <!-- Avatar Section -->
  <div
    class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] p-8 mb-8"
  >
    <h2 class="text-xl font-bold text-[#172033] mb-6">Profile Photo</h2>
    <div class="flex items-center gap-6">
      <p-avatar
        [image]="auth.user()?.avatar || ''"
        [label]="auth.user()?.avatar ? '' : auth.user()?.name?.[0] || 'U'"
        shape="circle"
        size="xlarge"
        styleClass="bg-gradient-to-br from-[#355d87] to-[#172033] text-white"
      />
      <div>
        <p class="text-sm text-gray-500 mb-3">Update your profile picture</p>
        <p-fileupload
          mode="basic"
          accept="image/*"
          [maxFileSize]="2000000"
          chooseLabel="Choose Photo"
          (onSelect)="onAvatarSelect($event)"
          [auto]="false"
          styleClass="w-full"
        />
      </div>
    </div>
  </div>

  <!-- Profile Info Section -->
  <div
    class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] p-8 mb-8"
  >
    <h2 class="text-xl font-bold text-[#172033] mb-6">Profile Information</h2>
    <form (ngSubmit)="saveProfile()" class="space-y-6 max-w-xl">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-[#172033] mb-2">Full Name</label>
          <input
            type="text"
            pInputText
            [(ngModel)]="name"
            name="name"
            class="w-full px-4 py-3 rounded-lg border border-slate-900/10 focus:outline-none focus:ring-2 focus:ring-[#355d87]/20"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-[#172033] mb-2">Username</label>
          <input
            type="text"
            pInputText
            [(ngModel)]="username"
            name="username"
            class="w-full px-4 py-3 rounded-lg border border-slate-900/10 focus:outline-none focus:ring-2 focus:ring-[#355d87]/20"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-[#172033] mb-2">Email Address</label>
        <input
          type="email"
          pInputText
          [(ngModel)]="email"
          name="email"
          class="w-full px-4 py-3 rounded-lg border border-slate-900/10 focus:outline-none focus:ring-2 focus:ring-[#355d87]/20"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-[#172033] mb-2">Bio</label>
        <textarea
          pTextarea
          [(ngModel)]="bio"
          name="bio"
          rows="4"
          class="w-full px-4 py-3 rounded-lg border border-slate-900/10 focus:outline-none focus:ring-2 focus:ring-[#355d87]/20"
          placeholder="Tell people about yourself"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-[#172033] mb-2">Gender</label>
        <p-select
          [options]="genderOptions"
          [(ngModel)]="gender"
          name="gender"
          optionLabel="label"
          optionValue="value"
          placeholder="Select gender"
          styleClass="w-full"
        />
      </div>

      <div class="pt-4">
        <p-button
          type="submit"
          label="Save Changes"
          [loading]="savingProfile()"
          severity="contrast"
          size="large"
        />
      </div>
    </form>
  </div>

  <!-- Password Section -->
  <div
    class="rounded-2xl border border-slate-900/10 bg-white shadow-[0_8px_32px_rgba(23,32,51,0.08)] p-8"
  >
    <h2 class="text-xl font-bold text-[#172033] mb-6">Change Password</h2>
    <form (ngSubmit)="changePassword()" class="space-y-6 max-w-xl">
      <div>
        <label class="block text-sm font-semibold text-[#172033] mb-2">Current Password</label>
        <p-password
          [(ngModel)]="oldPassword"
          name="oldPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full px-4 py-3 rounded-lg border border-slate-900/10"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-[#172033] mb-2">New Password</label>
        <p-password
          [(ngModel)]="newPassword"
          name="newPassword"
          [toggleMask]="true"
          [feedback]="true"
          styleClass="w-full"
          inputStyleClass="w-full px-4 py-3 rounded-lg border border-slate-900/10"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-[#172033] mb-2">Confirm New Password</label>
        <p-password
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full px-4 py-3 rounded-lg border border-slate-900/10"
        />
      </div>

      <div class="pt-4">
        <p-button
          type="submit"
          label="Change Password"
          [loading]="savingPassword()"
          severity="secondary"
          size="large"
        />
      </div>
    </form>
  </div>
</div>
