<div class="max-w-2xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Settings</h1>

  <!-- Avatar -->
  <section class="mb-8">
    <h2 class="text-lg font-semibold text-gray-900 mb-4">Profile Photo</h2>
    <div class="flex items-center gap-4">
      <p-avatar
        [image]="auth.user()?.avatar || ''"
        [label]="auth.user()?.avatar ? '' : auth.user()?.name?.[0] || 'U'"
        shape="circle"
        size="xlarge"
        styleClass="bg-gray-200 text-gray-700"
      />
      <p-fileupload
        mode="basic"
        accept="image/*"
        [maxFileSize]="2000000"
        chooseLabel="Change"
        (onSelect)="onAvatarSelect($event)"
        [auto]="false"
        chooseStyleClass="p-button-outlined p-button-secondary p-button-sm"
      />
    </div>
  </section>

  <p-divider />

  <!-- Profile Info -->
  <section class="mb-8">
    <h2 class="text-lg font-semibold text-gray-900 mb-4">Profile Information</h2>
    <form (ngSubmit)="saveProfile()" class="space-y-4 max-w-lg">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" pInputText [(ngModel)]="name" name="name" class="w-full" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" pInputText [(ngModel)]="username" name="username" class="w-full" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" pInputText [(ngModel)]="email" name="email" class="w-full" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
        <textarea
          pTextarea
          [(ngModel)]="bio"
          name="bio"
          rows="3"
          class="w-full"
          placeholder="Tell people about yourself"
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
        <p-select
          [options]="genderOptions"
          [(ngModel)]="gender"
          name="gender"
          optionLabel="label"
          optionValue="value"
          placeholder="Select gender"
          styleClass="w-full"
        />
      </div>
      <p-button
        type="submit"
        label="Save Changes"
        [loading]="savingProfile()"
        severity="contrast"
      />
    </form>
  </section>

  <p-divider />

  <!-- Password -->
  <section>
    <h2 class="text-lg font-semibold text-gray-900 mb-4">Change Password</h2>
    <form (ngSubmit)="changePassword()" class="space-y-4 max-w-lg">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
        <p-password
          [(ngModel)]="oldPassword"
          name="oldPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <p-password
          [(ngModel)]="newPassword"
          name="newPassword"
          [toggleMask]="true"
          [feedback]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <p-password
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>
      <p-button
        type="submit"
        label="Change Password"
        [loading]="savingPassword()"
        severity="secondary"
      />
    </form>
  </section>
</div>
