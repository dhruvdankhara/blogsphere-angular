<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Create Story</h1>
    <p class="text-gray-500 mt-1 text-sm">Share your thoughts with the world</p>
  </div>

  <form (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Left Column: Main Content -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Title -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Title</label>
          <input
            type="text"
            pInputText
            [(ngModel)]="title"
            name="title"
            (ngModelChange)="generateSlug()"
            class="w-full text-2xl font-bold border-0 border-b border-gray-200 rounded-none px-0 focus:ring-0 pb-2"
            placeholder="Enter your story title..."
          />
        </div>

        <!-- Slug -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fa fa-link mr-1 text-gray-400"></i>URL Slug
          </label>
          <input
            type="text"
            pInputText
            [(ngModel)]="slug"
            name="slug"
            class="w-full"
            placeholder="url-friendly-slug"
          />
          <p class="text-xs text-gray-400 mt-1">This will be used in the URL of your post</p>
        </div>

        <!-- Content Editor -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
          <label class="block text-sm font-semibold text-gray-700 mb-3">
            <i class="fa fa-file-edit mr-1 text-gray-400"></i>Content
          </label>
          <p-editor
            [(ngModel)]="content"
            name="content"
            [style]="{ height: '450px' }"
            placeholder="Tell your story..."
          />
        </div>
      </div>

      <!-- Right Column: Settings -->
      <div class="lg:col-span-1 space-y-6">
        <!-- Feature Image -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
          <label class="block text-sm font-semibold text-gray-700 mb-3">
            <i class="fa fa-image mr-1 text-gray-400"></i>Feature Image
          </label>
          @if (featureImagePreview) {
            <div class="relative">
              <img
                [src]="featureImagePreview"
                class="w-full object-cover rounded-lg aspect-video border border-gray-200"
              />
              <button
                type="button"
                (click)="removeImage()"
                class="absolute top-2 right-2 bg-white rounded-full p-1.5 shadow-md cursor-pointer border border-gray-200 hover:bg-red-50 transition-colors"
              >
                <i class="fa fa-times text-gray-500 text-xs"></i>
              </button>
            </div>
          } @else {
            <div
              class="border-2 border-dashed border-gray-200 rounded-lg p-6 text-center hover:border-gray-300 transition-colors"
            >
              <i class="fa fa-cloud-upload text-3xl text-gray-300 mb-2 block"></i>
              <p class="text-sm text-gray-400 mb-3">Upload a cover image</p>
              <p-fileupload
                mode="basic"
                accept="image/*"
                [maxFileSize]="5000000"
                chooseLabel="Choose Image"
                (onSelect)="onImageSelect($event)"
                [auto]="false"
                chooseStyleClass="p-button-outlined p-button-secondary"
              />
            </div>
          }
        </div>

        <!-- Category & Tags -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm space-y-5">
          <h3 class="text-sm font-semibold text-gray-700">
            <i class="fa fa-tags mr-1 text-gray-400"></i>Organization
          </h3>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Category</label>
            <p-select
              [options]="categories()"
              [(ngModel)]="selectedCategory"
              name="category"
              optionLabel="name"
              optionValue="_id"
              placeholder="Select category"
              [showClear]="true"
              styleClass="w-full"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Tags</label>
            <p-multiselect
              [options]="tags()"
              [(ngModel)]="selectedTags"
              name="tags"
              optionLabel="name"
              optionValue="_id"
              placeholder="Select tags"
              styleClass="w-full"
            />
          </div>
        </div>

        <!-- Publishing Options -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm space-y-4">
          <h3 class="text-sm font-semibold text-gray-700">
            <i class="fa fa-cog mr-1 text-gray-400"></i>Publishing Options
          </h3>
          <div class="flex items-center justify-between py-2 border-b border-gray-100">
            <div>
              <p class="text-sm font-medium text-gray-700">Public</p>
              <p class="text-xs text-gray-400">Visible to everyone</p>
            </div>
            <p-toggleswitch [(ngModel)]="isPublic" name="isPublic" />
          </div>
          <div class="flex items-center justify-between py-2">
            <div>
              <p class="text-sm font-medium text-gray-700">Save as Draft</p>
              <p class="text-xs text-gray-400">Don't publish yet</p>
            </div>
            <p-toggleswitch [(ngModel)]="isDraft" name="isDraft" />
          </div>
        </div>

        <!-- Submit -->
        <div class="flex flex-col gap-3">
          <p-button
            type="submit"
            [label]="isDraft ? 'Save Draft' : 'Publish Story'"
            [loading]="loading()"
            severity="contrast"
            styleClass="w-full justify-center"
            [icon]="isDraft ? 'fa fa-save' : 'fa fa-paper-plane'"
          />
        </div>
      </div>
    </div>
  </form>
</div>
