<div>
  <h1 class="text-2xl font-bold text-gray-900 mb-1">Welcome back, {{ auth.user()?.name }}</h1>
  <p class="text-gray-500 mb-8">Here's what's new on BlogSphere</p>

  @if (loading()) {
    <div class="flex justify-center py-10">
      <p-progressSpinner strokeWidth="3" />
    </div>
  } @else {
    @for (blog of blogs(); track blog._id) {
      <app-blog-card [blog]="blog" />
    }
    @if (!blogs().length) {
      <div class="text-center py-16">
        <p class="text-gray-400 mb-4">No stories to show</p>
        <a routerLink="/explore" class="text-gray-900 font-medium hover:underline"
          >Explore stories</a
        >
      </div>
    }
  }
</div>
