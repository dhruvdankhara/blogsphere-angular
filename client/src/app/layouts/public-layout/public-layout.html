<header class="public-header">
  <div class="public-header__inner">
    <div class="navbar-shell">
      <a routerLink="/" class="brand-mark no-underline" aria-label="BlogSphere home">
        <span class="brand-mark__icon">B</span>
        <span class="brand-mark__text">
          <strong>BlogSphere</strong>
          <small>Read with depth</small>
        </span>
      </a>

      <nav class="nav-links" aria-label="Primary">
        <a
          routerLink="/"
          routerLinkActive="nav-links__item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-links__item no-underline"
        >
          Home
        </a>
        <a
          routerLink="/explore"
          routerLinkActive="nav-links__item--active"
          class="nav-links__item no-underline"
        >
          Explore
        </a>
        <a
          routerLink="/search"
          routerLinkActive="nav-links__item--active"
          class="nav-links__item no-underline"
        >
          Search
        </a>
      </nav>

      <div class="nav-actions">
        <a
          routerLink="/search"
          routerLinkActive="nav-icon-link--active"
          class="nav-icon-link no-underline"
          aria-label="Search stories"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
        </a>

        @if (auth.isLoggedIn()) {
          <div class="relative flex items-center gap-3">
            <a routerLink="/create" class="hidden sm:inline-flex no-underline">
              <p-button label="Write" severity="secondary" />
            </a>
            <button
              type="button"
              class="profile-trigger"
              (click)="menu.toggle($event)"
              aria-label="Open user menu"
            >
              <p-avatar
                [image]="auth.user()?.avatar || ''"
                [label]="auth.user()?.avatar ? '' : auth.user()?.name?.[0] || 'U'"
                shape="circle"
                styleClass="bg-gray-200 text-gray-700"
              />
            </button>
            <p-menu #menu [model]="userMenuItems" [popup]="true" appendTo="body" />
          </div>
        } @else {
          <div class="nav-auth">
            <a routerLink="/login" class="no-underline">
              <p-button label="Sign In" [text]="true" />
            </a>
            <a routerLink="/register" class="no-underline">
              <p-button label="Get Started" severity="contrast" />
            </a>
          </div>
        }
      </div>
    </div>
  </div>
</header>

<main class="public-main">
  <router-outlet />
</main>

<footer class="public-footer">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-sm text-gray-500">&copy; 2025 BlogSphere. All rights reserved.</p>
      <div class="flex gap-6">
        <a routerLink="/about" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >About</a
        >
        <a routerLink="/terms" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >Terms</a
        >
        <a routerLink="/privacy" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >Privacy</a
        >
        <a routerLink="/contact" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >Contact</a
        >
      </div>
    </div>
  </div>
</footer>
