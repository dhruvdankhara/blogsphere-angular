<header class="sticky top-0 z-50 bg-white border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a routerLink="/" class="text-2xl font-bold text-gray-900 no-underline"> BlogSphere </a>

      <!-- Search Bar -->
      <div class="hidden md:flex items-center flex-1 max-w-md mx-8 bg-white">
        <span class="p-input-icon-left w-full">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            pInputText
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            placeholder="Search..."
            class="w-full"
          />
        </span>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-3">
        <a
          routerLink="/explore"
          class="text-gray-600 hover:text-gray-900 no-underline hidden sm:inline"
        >
          Explore
        </a>

        @if (auth.isLoggedIn()) {
          <a routerLink="/create">
            <p-button
              icon="fa-regular fa-pen-to-square"
              label="Write"
              severity="secondary"
              [text]="true"
            />
          </a>
          <div class="relative">
            <p-avatar
              [image]="auth.user()?.avatar || ''"
              [label]="auth.user()?.avatar ? '' : auth.user()?.name?.[0] || 'U'"
              shape="circle"
              class="cursor-pointer"
              (click)="menu.toggle($event)"
              styleClass="bg-gray-200 text-gray-700"
            />
            <p-menu #menu [model]="userMenuItems" [popup]="true" appendTo="body" />
          </div>
        } @else {
          <a routerLink="/login">
            <p-button label="Sign In" [text]="true" />
          </a>
          <a routerLink="/register">
            <p-button label="Get Started" severity="contrast" />
          </a>
        }
      </div>
    </div>
  </div>
</header>

<main class="min-h-screen bg-white">
  <router-outlet />
</main>

<footer class="border-t border-gray-200 bg-gray-50 py-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-sm text-gray-500">&copy; 2025 BlogSphere. All rights reserved.</p>
      <div class="flex gap-6">
        <a routerLink="/about" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >About</a
        >
        <a routerLink="/terms" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >Terms</a
        >
        <a routerLink="/privacy" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >Privacy</a
        >
        <a routerLink="/contact" class="text-sm text-gray-500 hover:text-gray-700 no-underline"
          >Contact</a
        >
      </div>
    </div>
  </div>
</footer>
