<header class="sticky top-0 z-50 px-3 pt-3 sm:px-6 sm:pt-5">
  <div class="mx-auto max-w-7xl">
    <div
      class="flex items-center justify-between gap-3 rounded-[1.6rem] border border-slate-900/8 bg-white/82 px-3 py-3 shadow-[0_18px_40px_rgba(17,24,39,0.08)] backdrop-blur sm:rounded-full sm:px-5"
    >
      <a
        routerLink="/"
        class="inline-flex min-w-0 items-center gap-3 no-underline"
        aria-label="BlogSphere home"
      >
        <span
          class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-[linear-gradient(135deg,#172033,#355d87)] text-sm font-extrabold tracking-[-0.04em] text-white"
        >
          <img src="./logo.png" alt="" class="object-cover size-14" />
        </span>
        <span class="hidden min-[561px]:flex min-[561px]:flex-col min-[561px]:leading-tight">
          <strong class="text-2xl font-extrabold tracking-[-0.03em] text-[#172033]"
            >BlogSphere</strong
          >
        </span>
      </a>

      <nav
        class="hidden items-center gap-2 rounded-full bg-slate-100/95 p-1 md:inline-flex"
        aria-label="Primary"
      >
        <a
          routerLink="/"
          routerLinkActive="bg-white text-[#172033] shadow-[0_8px_20px_rgba(17,24,39,0.08)]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-4 py-2.5 text-sm font-semibold text-[#677287] transition hover:text-[#172033] no-underline"
        >
          Home
        </a>
        <a
          routerLink="/explore"
          routerLinkActive="bg-white text-[#172033] shadow-[0_8px_20px_rgba(17,24,39,0.08)]"
          class="rounded-full px-4 py-2.5 text-sm font-semibold text-[#677287] transition hover:text-[#172033] no-underline"
        >
          Explore
        </a>
        <a
          routerLink="/search"
          routerLinkActive="bg-white text-[#172033] shadow-[0_8px_20px_rgba(17,24,39,0.08)]"
          class="rounded-full px-4 py-2.5 text-sm font-semibold text-[#677287] transition hover:text-[#172033] no-underline"
        >
          Search
        </a>
      </nav>

      <div class="flex items-center gap-3">
        <a
          routerLink="/search"
          routerLinkActive="bg-[#172033] text-white"
          class="inline-flex h-11 w-11 items-center justify-center rounded-full bg-slate-100/95 text-base text-[#677287] transition hover:text-[#172033] no-underline"
          aria-label="Search stories"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
        </a>

        @if (auth.isLoggedIn()) {
          <div class="relative flex items-center gap-3">
            <a routerLink="/create" class="hidden no-underline sm:inline-flex">
              <p-button label="Write" severity="secondary" />
            </a>
            <button
              type="button"
              class="inline-flex cursor-pointer items-center justify-center rounded-full bg-slate-100/95 p-1 shadow-[inset_0_0_0_1px_rgba(17,24,39,0.06)]"
              (click)="menu.toggle($event)"
              aria-label="Open user menu"
            >
              <p-avatar
                [image]="auth.user()?.avatar || ''"
                [label]="auth.user()?.avatar ? '' : auth.user()?.name?.[0] || 'U'"
                shape="circle"
                styleClass="bg-gray-200 text-gray-700"
              />
            </button>
            <p-menu #menu [model]="userMenuItems" [popup]="true" appendTo="body" />
          </div>
        } @else {
          <div class="flex items-center gap-1.5 sm:gap-3">
            <a routerLink="/login" class="hidden no-underline md:inline-flex">
              <p-button label="Sign In" [text]="true" />
            </a>
            <a routerLink="/register" class="no-underline">
              <p-button label="Get Started" severity="contrast" [rounded]="true" />
            </a>
          </div>
        }
      </div>
    </div>
  </div>
</header>

<main class="min-h-screen pt-4 sm:pt-5">
  <router-outlet />
</main>
